<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Zarządzania Leadami - CHMURA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--card-bg);
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            color: #111827;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .online-status {
            text-align: center;
            color: #10b981;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .online-status::before {
            content: "● ";
        }

        h2 {
            color: #111827;
            font-size: 18px;
            font-weight: 600;
            margin-top: 40px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .script-section { background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 30px; }
        .script-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .script-header h2 { margin: 0; border: none; padding: 0; color: #374151; font-size: 16px; }

        textarea {
            width: 100%; height: 120px; padding: 12px 16px; font-size: 14px;
            font-family: 'Inter', sans-serif; border: 1px solid var(--border-color);
            border-radius: 8px; outline: none; resize: vertical; box-sizing: border-box;
        }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }

        .btn-copy { background-color: white; border: 1px solid var(--border-color); padding: 6px 14px; font-size: 13px; border-radius: 6px; cursor: pointer; font-weight: 500; }
        .btn-copy:hover { background-color: #f3f4f6; }

        .form-group { display: flex; gap: 12px; margin-bottom: 30px; justify-content: center; background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); flex-wrap: wrap; }
        input { padding: 12px 16px; font-size: 15px; font-family: 'Inter', sans-serif; border: 1px solid var(--border-color); border-radius: 8px; outline: none; width: 250px; }
        input:focus { border-color: var(--primary); }

        .btn-add { padding: 12px 24px; font-size: 15px; border: none; border-radius: 8px; cursor: pointer; background-color: var(--primary); color: white; }
        .btn-add:hover { background-color: var(--primary-hover); }

        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 10px; }
        th, td { padding: 16px 12px; text-align: left; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        th { background-color: #f9fafb; color: var(--text-muted); font-size: 13px; text-transform: uppercase; }
        
        .lp-column { font-weight: 600; color: var(--text-muted); width: 40px; text-align: center; }
        .phone-link { font-size: 15px; font-weight: 600; color: var(--primary); text-decoration: none; background: #eff6ff; padding: 6px 12px; border-radius: 6px; display: inline-block; }
        
        .current-status { font-weight: 600; padding: 6px 12px; border-radius: 9999px; font-size: 13px; text-align: center; min-width: 90px; display: inline-block; }
        .status-nowy { background-color: #f3f4f6; color: #4b5563; }
        .status-chetny { background-color: #dcfce7; color: #166534; }
        .status-niechetny { background-color: #fee2e2; color: #991b1b; }
        .status-zastanowi { background-color: #fef9c3; color: #854d0e; }

        .btn-status { font-size: 12px; margin-right: 4px; padding: 6px 10px; border-radius: 6px; cursor: pointer; background: white; border: 1px solid var(--border-color); margin-bottom: 4px; }
        .btn-status.status-chetny:hover { border-color: #22c55e; background-color: #dcfce7; }
        .btn-status.status-niechetny:hover { border-color: #ef4444; background-color: #fee2e2; }
        .btn-status.status-zastanowi:hover { border-color: #eab308; background-color: #fef9c3; }

        .btn-delete { background-color: transparent; color: var(--danger); border: 1px solid #fca5a5; padding: 6px 12px; font-size: 13px; border-radius: 6px; cursor: pointer; }
        .btn-delete:hover { background-color: #fee2e2; }

        /* Poprawka dla małych ekranów (telefonów) */
        @media (max-width: 768px) {
            .form-group input { width: 100%; }
            table { display: block; overflow-x: auto; white-space: nowrap; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📞 Panel Dzwonienia - Michał i Kuba</h1>
    <div class="online-status">Działamy na pełnej, spełniamy marzenia! Dajemy z siebie 100%!</div>
    
    <div class="script-section">
        <div class="script-header">
            <h2>📝 Skrypt rozmowy - PORADNIKI CO MÓWIĆ</h2>
            <button class="btn-copy" onclick="copyScript()">Kopiuj skrypt</button>
        </div>
        <textarea id="callScript" placeholder="" onchange="saveScript()"></textarea>
    </div>
    
    <div class="form-group">
        <input type="text" id="leadName" placeholder="Imię klienta (opcjonalnie)">
        <input type="tel" id="leadPhone" placeholder="Numer telefonu *" required>
        <button class="btn-add" onclick="addLead()">Dodaj Leada</button>
    </div>

    <h2>Lista kontaktów</h2>
    <table>
        <thead>
            <tr>
                <th class="lp-column">Lp.</th>
                <th>Imię</th>
                <th>Numer Telefonu</th>
                <th>Obecny Status</th>
                <th>Zmień Status</th>
                <th>Akcja</th>
            </tr>
        </thead>
        <tbody id="leadsTableBody">
            <tr><td colspan="6" style="text-align: center;">Ładowanie danych z bazy...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // ==========================================
    // TWOJA KONFIGURACJA FIREBASE
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyBu-osks82ZCu_jmBsdsYPRdTpZr7duzwo",
        authDomain: "leady-c06a4.firebaseapp.com",
        databaseURL: "https://leady-c06a4-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "leady-c06a4",
        storageBucket: "leady-c06a4.firebasestorage.app",
        messagingSenderId: "163757934558",
        appId: "1:163757934558:web:a561fa59462074a31b3f4f"
    };

    // Inicjalizacja Bazy Danych
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ==========================================
    // LOGIKA APLIKACJI
    // ==========================================
    
    const scriptTextarea = document.getElementById('callScript');
    let leadsData = {};

    // 1. Odbieranie skryptu z bazy (na żywo)
    db.ref('script').on('value', (snapshot) => {
        const cloudScript = snapshot.val() || '';
        // Aktualizujemy textarea tylko jeśli akurat w nim nie piszemy (żeby nie przerywało)
        if (document.activeElement !== scriptTextarea) {
            scriptTextarea.value = cloudScript;
        }
    });

    // Zapisywanie skryptu do bazy (gdy odklikniemy myszką / palcem poza pole)
    function saveScript() {
        db.ref('script').set(scriptTextarea.value);
    }

    // Kopiowanie skryptu
    function copyScript() {
        if (!scriptTextarea.value.trim()) { alert('Skrypt jest pusty!'); return; }
        scriptTextarea.select();
        scriptTextarea.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(scriptTextarea.value).then(() => {
            
            const copyBtn = document.querySelector('.btn-copy');
            const originalText = copyBtn.innerText;
            
            copyBtn.innerText = 'Skopiowano! ✓';
            copyBtn.style.color = '#166534';
            copyBtn.style.borderColor = '#22c55e';
            copyBtn.style.backgroundColor = '#dcfce7';
            
            setTimeout(() => {
                copyBtn.innerText = originalText;
                copyBtn.style.color = '';
                copyBtn.style.borderColor = '';
                copyBtn.style.backgroundColor = '';
            }, 2000);

        }).catch(err => {
            alert('Nie udało się skopiować skryptu.');
        });
    }

    // 2. Odbieranie leadów z bazy (na żywo)
    db.ref('leads').on('value', (snapshot) => {
        leadsData = snapshot.val() || {};
        renderTable();
    });

    // Dodawanie leada (wysyłka do chmury)
    function addLead() {
        const nameInput = document.getElementById('leadName');
        const phoneInput = document.getElementById('leadPhone');
        
        if (phoneInput.value.trim() === '') {
            alert('Numer telefonu jest wymagany!');
            return;
        }

        // Firebase automatycznie wygeneruje unikalny klucz dla każdego leada
        db.ref('leads').push({
            name: nameInput.value.trim() || 'Nieznany',
            phone: phoneInput.value.trim(),
            status: 'Nowy',
            statusClass: 'status-nowy',
            timestamp: Date.now() // Do sortowania
        });
        
        nameInput.value = '';
        phoneInput.value = '';
    }

    // Zmiana statusu (aktualizacja w chmurze)
    function changeStatus(firebaseKey, newStatus, cssClass) {
        db.ref('leads/' + firebaseKey).update({
            status: newStatus,
            statusClass: cssClass
        });
    }

    // Usuwanie leada (usunięcie z chmury)
    function deleteLead(firebaseKey) {
        if(confirm('Czy na pewno chcesz usunąć ten kontakt? Operacja usunie go z każdego urządzenia.')) {
            db.ref('leads/' + firebaseKey).remove();
        }
    }

    // Rysowanie tabeli
    function renderTable() {
        const tbody = document.getElementById('leadsTableBody');
        tbody.innerHTML = '';

        // Konwersja obiektu Firebase na tablicę, żeby zachować kolejność Lp.
        const leadsArray = Object.keys(leadsData).map(key => {
            return { key: key, ...leadsData[key] };
        });

        if (leadsArray.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #6b7280;">Brak leadów. Dodaj kogoś powyżej!</td></tr>';
            return;
        }

        leadsArray.forEach((lead, index) => {
            const tr = document.createElement('tr');
            
            tr.innerHTML = `
                <td class="lp-column">${index + 1}.</td>
                <td><strong>${lead.name}</strong></td>
                <td><a href="tel:${lead.phone}" class="phone-link">${lead.phone}</a></td>
                <td><span class="current-status ${lead.statusClass}">${lead.status}</span></td>
                <td>
                    <button class="btn-status status-chetny" onclick="changeStatus('${lead.key}', 'Chętny', 'status-chetny')">Chętny</button>
                    <button class="btn-status status-niechetny" onclick="changeStatus('${lead.key}', 'Nie chętny', 'status-niechetny')">Nie chętny</button>
                    <button class="btn-status status-zastanowi" onclick="changeStatus('${lead.key}', 'Zastanowi się', 'status-zastanowi')">Zastanowi się</button>
                </td>
                <td>
                    <button class="btn-delete" onclick="deleteLead('${lead.key}')">Usuń</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }
</script>

</body>
</html>
