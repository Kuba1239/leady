<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Zarządzania Leadami</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--card-bg);
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
        }

        h1 {
            text-align: center;
            color: #111827;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        h2 {
            color: #111827;
            font-size: 18px;
            font-weight: 600;
            margin-top: 40px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        /* Sekcja Skryptu */
        .script-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .script-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .script-header h2 {
            margin: 0;
            border: none;
            padding: 0;
            color: #374151;
            font-size: 16px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px 16px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            resize: vertical;
            box-sizing: border-box;
            background: #fff;
            color: #374151;
            line-height: 1.5;
            transition: all 0.2s ease;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .btn-copy {
            background-color: white;
            color: #374151;
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-copy:hover {
            background-color: #f3f4f6;
            border-color: #d1d5db;
        }

        /* Sekcja formularza (Dodawanie Leada) */
        .form-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            justify-content: center;
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        input {
            padding: 12px 16px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s ease;
            width: 250px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        button {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            outline: none;
        }

        .btn-add {
            padding: 12px 24px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: var(--primary);
            color: white;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }

        .btn-add:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        /* Tabela */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 10px;
        }

        th, td {
            padding: 16px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        th {
            background-color: #f9fafb;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        th:first-child { border-top-left-radius: 8px; }
        th:last-child { border-top-right-radius: 8px; }

        tr:hover td {
            background-color: #f8fafc;
        }

        .lp-column {
            font-weight: 600;
            color: var(--text-muted);
            width: 40px;
            text-align: center;
        }

        /* Link do dzwonienia */
        .phone-link {
            font-size: 15px;
            font-weight: 600;
            color: var(--primary);
            text-decoration: none;
            background: #eff6ff;
            padding: 6px 12px;
            border-radius: 6px;
            display: inline-block;
            transition: all 0.2s ease;
        }

        .phone-link:hover {
            background: #dbeafe;
            color: var(--primary-hover);
            transform: scale(1.02);
        }

        /* Obecny Status */
        .current-status {
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 9999px;
            display: inline-block;
            font-size: 13px;
            text-align: center;
            min-width: 90px;
        }
        
        .status-nowy { background-color: #f3f4f6; color: #4b5563; }
        .status-chetny { background-color: #dcfce7; color: #166534; }
        .status-niechetny { background-color: #fee2e2; color: #991b1b; }
        .status-zastanowi { background-color: #fef9c3; color: #854d0e; }

        /* Przyciski zmiany statusu */
        .btn-status {
            font-size: 12px;
            margin-right: 4px;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            background: white;
            border: 1px solid var(--border-color);
            color: #374151;
            transition: all 0.2s ease;
        }

        .btn-status.status-chetny:hover { border-color: #22c55e; color: #166534; background-color: #dcfce7; }
        .btn-status.status-niechetny:hover { border-color: #ef4444; color: #991b1b; background-color: #fee2e2; }
        .btn-status.status-zastanowi:hover { border-color: #eab308; color: #854d0e; background-color: #fef9c3; }

        /* Przycisk Usuń */
        .btn-delete {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid #fca5a5;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-delete:hover {
            background-color: #fee2e2;
            border-color: var(--danger);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📞 Panel Klientów - Michał i Kuba</h1>
    
    <!-- NOWOŚĆ: Sekcja Skryptu -->
    <div class="script-section">
        <div class="script-header">
            <h2>📝 Skrypt rozmowy</h2>
            <button class="btn-copy" onclick="copyScript()">Kopiuj skrypt</button>
        </div>
        <textarea id="callScript" placeholder="Wklej tutaj swój skrypt rozmowy... Tekst zapisuje się automatycznie." oninput="saveScript()"></textarea>
    </div>
    
    <!-- Formularz dodawania leada -->
    <div class="form-group">
        <input type="text" id="leadName" placeholder="Imię klienta (opcjonalnie)">
        <input type="tel" id="leadPhone" placeholder="Numer telefonu *" required>
        <button class="btn-add" onclick="addLead()">Dodaj Leada</button>
    </div>

    <h2>Lista kontaktów</h2>
    <table>
        <thead>
            <tr>
                <th class="lp-column">Lp.</th>
                <th>Imię</th>
                <th>Numer Telefonu</th>
                <th>Obecny Status</th>
                <th>Zmień Status</th>
                <th>Akcja</th>
            </tr>
        </thead>
        <tbody id="leadsTableBody">
            <!-- Tutaj będą pojawiać się leady -->
        </tbody>
    </table>
</div>

<script>
    // --- OBSŁUGA SKRYPTU ROZMOWY ---
    const scriptTextarea = document.getElementById('callScript');
    
    // Wczytaj zapisany skrypt z pamięci przy starcie strony
    scriptTextarea.value = localStorage.getItem('callScript') || '';

    // Funkcja zapisująca skrypt przy każdym naciśnięciu klawisza
    function saveScript() {
        localStorage.setItem('callScript', scriptTextarea.value);
    }

    // Funkcja kopiująca skrypt do schowka
    function copyScript() {
        if (!scriptTextarea.value.trim()) {
            alert('Skrypt jest pusty!');
            return;
        }
        
        scriptTextarea.select();
        scriptTextarea.setSelectionRange(0, 99999); // Dla urządzeń mobilnych
        
        navigator.clipboard.writeText(scriptTextarea.value).then(() => {
            const copyBtn = document.querySelector('.btn-copy');
            const originalText = copyBtn.innerText;
            
            copyBtn.innerText = 'Skopiowano! ✓';
            copyBtn.style.color = '#166534';
            copyBtn.style.borderColor = '#22c55e';
            copyBtn.style.backgroundColor = '#dcfce7';
            
            setTimeout(() => {
                copyBtn.innerText = originalText;
                copyBtn.style.color = '';
                copyBtn.style.borderColor = '';
                copyBtn.style.backgroundColor = '';
            }, 2000);
        }).catch(err => {
            alert('Nie udało się skopiować skryptu.');
        });
    }

    // --- OBSŁUGA LEADÓW ---
    let leads = JSON.parse(localStorage.getItem('leads')) || [];

    function addLead() {
        const nameInput = document.getElementById('leadName');
        const phoneInput = document.getElementById('leadPhone');
        
        if (phoneInput.value.trim() === '') {
            alert('Numer telefonu jest wymagany!');
            return;
        }

        const newLead = {
            name: nameInput.value.trim() || 'Nieznany',
            phone: phoneInput.value.trim(),
            status: 'Nowy',
            statusClass: 'status-nowy'
        };

        leads.push(newLead);
        saveAndRender();
        
        nameInput.value = '';
        phoneInput.value = '';
    }

    function changeStatus(index, newStatus, cssClass) {
        leads[index].status = newStatus;
        leads[index].statusClass = cssClass;
        saveAndRender();
    }

    function deleteLead(index) {
        if(confirm('Czy na pewno chcesz usunąć ten kontakt?')) {
            leads.splice(index, 1);
            saveAndRender();
        }
    }

    function saveAndRender() {
        localStorage.setItem('leads', JSON.stringify(leads));
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('leadsTableBody');
        tbody.innerHTML = '';

        leads.forEach((lead, index) => {
            const tr = document.createElement('tr');
            
            tr.innerHTML = `
                <td class="lp-column">${index + 1}.</td>
                <td><strong>${lead.name}</strong></td>
                <td><a href="tel:${lead.phone}" class="phone-link">${lead.phone}</a></td>
                <td><span class="current-status ${lead.statusClass}">${lead.status}</span></td>
                <td>
                    <button class="btn-status status-chetny" onclick="changeStatus(${index}, 'Chętny', 'status-chetny')">Chętny</button>
                    <button class="btn-status status-niechetny" onclick="changeStatus(${index}, 'Nie chętny', 'status-niechetny')">Nie chętny</button>
                    <button class="btn-status status-zastanowi" onclick="changeStatus(${index}, 'Zastanowi się', 'status-zastanowi')">Zastanowi się</button>
                </td>
                <td>
                    <button class="btn-delete" onclick="deleteLead(${index})">Usuń</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Wywołanie renderowania po załadowaniu strony
    renderTable();
</script>

</body>
</html>
